<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Kids PRO</title>

<style>
body { font-family: Arial; text-align: center; background:#f3f4f6;}
button { padding:12px; margin:6px; font-size:16px; border-radius:10px; border:none; background:#10b981; color:white;}
.card {background:white; padding:10px; margin:10px; border-radius:10px;}
</style>
</head>

<body>

<h1>Английский для детей</h1>
<div id="app"></div>

<script>

// ===== ПРОГРЕСС =====
let stars = Number(localStorage.getItem("stars") || 0);

// ===== ОЗВУЧКА =====
function speak(t){
 let msg=new SpeechSynthesisUtterance(t);
 msg.lang="en-US";
 speechSynthesis.speak(msg);
}

// ===== ДАННЫЕ =====
const lessons = [

{
title:"Цифры 1–100",
words:[
"one","two","three","four","five","six","seven","eight","nine","ten",
"eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty",
"thirty","forty","fifty","sixty","seventy","eighty","ninety","one hundred"
],
quiz:[
{q:"one — это?",a:"один"},
{q:"ten — это?",a:"десять"}
]
},

{
title:"Цвета",
words:["red","blue","green","yellow","black","white","orange","pink","brown","grey","purple"],
quiz:[{q:"red — это?",a:"красный"}]
},

{
title:"Дни недели",
words:["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
quiz:[{q:"Monday — это?",a:"понедельник"}]
},

{
title:"Времена года",
words:["winter","spring","summer","autumn"],
quiz:[{q:"winter — это?",a:"зима"}]
},

{
title:"Животные",
words:["cat","dog","bird","cow","horse"],
quiz:[{q:"dog — это?",a:"собака"}]
},

{
title:"Еда",
words:["apple","milk","bread","banana","juice"],
quiz:[{q:"apple — это?",a:"яблоко"}]
},

{
title:"Школа",
words:["book","pen","teacher","desk","bag"],
quiz:[{q:"book — это?",a:"книга"}]
}

];

// ===== ГЛАВНАЯ =====
function home(){
 let html="<h2>⭐ "+stars+"</h2>";

 lessons.forEach((l,i)=>{
   html+=`<button onclick="lesson(${i})">${l.title}</button>`;
 });

 html+=`<br><button onclick="game()">🎮 Игра</button>`;

 app.innerHTML=html;
}

// ===== УРОК =====
function lesson(i){
 let l=lessons[i];
 let html="<h2>"+l.title+"</h2>";

 l.words.forEach(w=>{
  html+=`<div class="card">${w}<br>
  <button onclick="speak('${w}')">🔊</button></div>`;
 });

 html+=`<button onclick="quiz(${i})">Играть</button>`;
 html+=`<br><button onclick="home()">Назад</button>`;

 app.innerHTML=html;
}

// ===== ТЕСТ =====
function quiz(i){
 let q=lessons[i].quiz[0];

 app.innerHTML=`
 <h2>${q.q}</h2>
 <input id="a">
 <br>
 <button onclick="check(${i})">Ответ</button>`;
}

function check(i){
 let q=lessons[i].quiz[0];
 let a=document.getElementById("a").value.toLowerCase();

 if(a==q.a){
   stars++;
   localStorage.setItem("stars",stars);
   alert("🔥 Правильно!");
 } else alert("Попробуй ещё");

 home();
}

// ===== ИГРА (РАБОЧАЯ) =====
function game(){
 let list=[
   {en:"cat",ru:"кот"},
   {en:"dog",ru:"собака"},
   {en:"apple",ru:"яблоко"}
 ];

 let w=list[Math.floor(Math.random()*list.length)];
 let a=prompt("Переведи: "+w.en);

 if(a && a.toLowerCase()==w.ru){
   stars++;
   localStorage.setItem("stars",stars);
   alert("🔥 Верно!");
 } else alert("Неправильно");
}

// ===== СТАРТ =====
home();

</script>

</body>
</html>
